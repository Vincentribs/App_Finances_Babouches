<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Babouches</title>

    <meta name="application-name" content="Babouches">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Babouches">
    <meta name="theme-color" content="#1a1612">

    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='112' fill='%231a1612'/%3E%3Cpath d='M140 310 Q150 240 200 210 Q230 195 256 195 Q310 195 355 240 Q380 265 375 310 Q370 330 350 338 Q300 355 256 355 Q200 355 165 338 Q140 328 140 310Z' fill='%23c96c3a'/%3E%3C/svg%3E">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');

        :root {
            --sand: #f5f0e8;
            --sand-dark: #ede6d6;
            --ink: #1a1612;
            --ink-light: #5a4e42;
            --ink-faint: #9a8e82;
            --terracotta: #c96c3a;
            --terracotta-light: #f0d5c4;
            --sage: #4a7c6e;
            --sage-light: #c4dcd7;
            --gold: #d4a843;
            --gold-light: #f5e8c4;
            --white: #fdfaf5;
            --red: #c9423a;
            --red-light: #f5d0ce;
            --border: rgba(26,22,18,0.12);
            --shadow: 0 2px 16px rgba(26,22,18,0.08);
            --shadow-lg: 0 8px 40px rgba(26,22,18,0.14);
            --radius: 12px;
            --radius-sm: 8px;
            /* Safe area for iPhone 11+ */
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--sand); color: var(--ink); min-height: 100vh; font-size: 15px; line-height: 1.5; padding-bottom: var(--safe-bottom); }

        /* AUTH SCREEN */
        #auth-screen {
            position: fixed; inset: 0; background: var(--ink); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; color: var(--sand); text-align: center; padding: 20px;
        }
        #auth-screen h1 { font-family: 'DM Serif Display', serif; font-size: 3rem; margin-bottom: 10px; }
        #auth-screen h1 span { color: var(--terracotta); }
        .btn-google { background: var(--white); color: var(--ink); padding: 14px 24px; border-radius: 40px; border: none; font-weight: 600; display: flex; align-items: center; gap: 10px; cursor: pointer; font-family: 'DM Sans', sans-serif; margin-top: 30px; }

        /* HEADER */
        header {
            background: var(--ink); color: var(--sand);
            padding: calc(var(--safe-top) + 10px) 16px 14px;
            display: flex; align-items: center; justify-content: space-between; gap: 10px;
            position: sticky; top: 0; z-index: 100;
            box-shadow: 0 2px 20px rgba(0,0,0,0.2);
        }
        .header-left h1 { font-family: 'DM Serif Display', serif; font-size: 1.2rem; white-space: nowrap; }
        .header-left h1 span { color: var(--terracotta); }

        .month-nav { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.08); border-radius: 40px; padding: 5px 5px 5px 12px; }
        .month-nav span { font-size: 0.76rem; font-weight: 500; min-width: 90px; text-align: center; text-transform: uppercase; }
        .month-nav button { background: rgba(255,255,255,0.12); border: none; color: var(--sand); width: 28px; height: 28px; border-radius: 50%; cursor: pointer; }

        .header-menu-wrap { position: relative; }
        .btn-menu { background: rgba(255,255,255,0.1); border: none; color: var(--sand); width: 34px; height: 34px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; }

        /* TABS */
        .tabs { background: var(--white); border-bottom: 1px solid var(--border); display: flex; overflow-x: auto; position: sticky; top: calc(62px + var(--safe-top)); z-index: 90; }
        .tab { padding: 13px 18px; font-size: 0.75rem; font-weight: 500; color: var(--ink-faint); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; text-transform: uppercase; }
        .tab.active { color: var(--terracotta); border-bottom-color: var(--terracotta); }

        /* MAIN */
        main { max-width: 860px; margin: 0 auto; padding: 20px 14px 100px; }
        .section { display: none; }
        .section.active { display: block; }

        /* CARDS */
        .card { background: var(--white); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); margin-bottom: 14px; border: 1px solid var(--border); }
        .card-title { font-family: 'DM Serif Display', serif; font-size: 1.05rem; margin-bottom: 14px; color: var(--ink); display: flex; align-items: center; gap: 8px; }
        .card-title .icon { width: 26px; height: 26px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; }

        /* SUMMARY GRID */
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 14px; }
        .stat-card { background: var(--white); border-radius: var(--radius); padding: 16px; border: 1px solid var(--border); box-shadow: var(--shadow); }
        .stat-card .label { font-size: 0.68rem; font-weight: 500; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 5px; }
        .stat-card .value { font-family: 'DM Serif Display', serif; font-size: 1.65rem; color: var(--ink); }
        .stat-card.accent { background: var(--ink); color: var(--sand); }
        .stat-card.accent .value { color: var(--sand); }
        .stat-card.cagnotte { background: var(--gold); color: white; border-color: var(--gold); }
        .stat-card.cagnotte .value { color: white; }
        .stat-card.cagnotte .label { color: rgba(255,255,255,0.8); }

        /* REIMBURSEMENTS */
        .reimb-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: var(--radius-sm); font-size: 0.88rem; margin-bottom: 8px; }
        .reimb-item.owed { background: var(--terracotta-light); }
        .reimb-item.balanced { background: var(--sage-light); }
        .reimb-amount { font-family: 'DM Serif Display', serif; font-size: 1.25rem; margin-left: auto; color: var(--terracotta); }

        /* BUTTONS */
        .btn { display: inline-flex; align-items: center; gap: 8px; padding: 11px 22px; border: none; border-radius: 40px; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--terracotta); color: white; }
        .btn-secondary { background: var(--sand-dark); color: var(--ink); }
        .btn-settle { background: var(--ink); color: white; font-size: 0.7rem; padding: 6px 12px; margin-top: 5px; }
        .btn-cagnotte { background: var(--gold); color: white; margin-top: 10px; width: 100%; justify-content: center; }

        /* FORM ELEMENTS */
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.76rem; font-weight: 500; text-transform: uppercase; color: var(--ink-light); margin-bottom: 4px; }
        input, select { width: 100%; padding: 10px 13px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; background: var(--sand); outline: none; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        /* EXPENSE LIST */
        .expense-item { display: flex; align-items: center; gap: 10px; padding: 11px 13px; background: var(--sand); border-radius: var(--radius-sm); border: 1px solid var(--border); margin-bottom: 7px; }
        .expense-desc { font-weight: 500; font-size: 0.87rem; }
        .expense-meta { font-size: 0.72rem; color: var(--ink-faint); }
        .expense-amount { font-family: 'DM Serif Display', serif; font-size: 1.05rem; margin-left: auto; }

        /* DROPDOWN MENU */
        .header-dropdown { position: absolute; top: calc(100% + 8px); right: 0; background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow-lg); border: 1px solid var(--border); min-width: 210px; z-index: 200; overflow: hidden; display: none; }
        .header-dropdown.open { display: block; }
        .dropdown-item { padding: 12px 16px; font-size: 0.85rem; font-weight: 500; color: var(--ink); cursor: pointer; border: none; background: none; width: 100%; text-align: left; }
        .dropdown-item:hover { background: var(--sand); }

        /* PROGRESS BARS */
        .progress-bar { height: 6px; background: var(--sand-dark); border-radius: 3px; overflow: hidden; margin-top: 6px; }
        .progress-fill { height: 100%; background: var(--sage); }

        /* FAB */
        .fab { position: fixed; bottom: calc(24px + var(--safe-bottom)); right: 20px; width: 56px; height: 56px; border-radius: 50%; background: var(--terracotta); color: white; border: none; font-size: 1.6rem; box-shadow: 0 4px 20px rgba(201,108,58,0.45); cursor: pointer; z-index: 80; }

        /* MODALS */
        .modal-overlay { position: fixed; inset: 0; background: rgba(26,22,18,0.5); z-index: 200; display: none; align-items: flex-end; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
        .modal-overlay.open { display: flex; }
        .modal { background: var(--white); border-radius: var(--radius); padding: 24px; width: 100%; max-width: 500px; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }

        /* TOAST */
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--ink); color: var(--sand); padding: 11px 18px; border-radius: 40px; font-size: 0.83rem; z-index: 400; transition: 0.3s; }
        .toast.show { transform: translateX(-50%) translateY(0); }
        
        @media (max-width: 500px) { .form-row { grid-template-columns: 1fr; } .summary-grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

<div id="auth-screen">
    <h1><span>B</span>abouches</h1>
    <p>Gestion financière de Vincent & Margaux</p>
    <div id="auth-error" style="color:var(--red); margin-top:20px; display:none; font-size:0.9rem;">Accès refusé. Compte non autorisé.</div>
    <button class="btn-google" id="loginBtn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18" alt="Google">
        Se connecter avec Google
    </button>
</div>

<header>
    <div class="header-left"><h1><span>FB</span></h1></div>
    <div class="month-nav">
        <button onclick="changeMonth(-1)">‹</button>
        <span id="monthDisplay"></span>
        <button onclick="changeMonth(1)">›</button>
    </div>
    <div class="header-menu-wrap">
        <button class="btn-menu" onclick="toggleMenu()">···</button>
        <div class="header-dropdown" id="headerDropdown">
            <button class="dropdown-item" onclick="duplicatePrevMonth()">⊕ Dupliquer mois préc.</button>
            <button class="dropdown-item" onclick="exportCSV()">⬇ Exporter CSV</button>
            <div style="height:1px; background:var(--border)"></div>
            <button class="dropdown-item" style="color:var(--red)" onclick="logout()">Se déconnecter</button>
        </div>
    </div>
</header>

<div class="tabs">
    <div class="tab active" onclick="showTab('summary',this)">Résumé</div>
    <div class="tab" onclick="showTab('expenses',this)">Dépenses</div>
    <div class="tab" onclick="showTab('budgets',this)">Budgets</div>
    <div class="tab" onclick="showTab('settings',this)">Paramètres</div>
</div>

<main>
    <div class="section active" id="section-summary">
        <div class="summary-grid" id="summaryCards"></div>
        
        <div id="cagnotteAction"></div>

        <div class="card">
            <div class="card-title"><div class="icon" style="background:var(--gold-light)">↔</div>Remboursements</div>
            <div id="reimbursements"></div>
        </div>

        <div class="card">
            <div class="card-title"><div class="icon" style="background:var(--sage-light)">📊</div>Budgets actifs</div>
            <div id="summaryBudgets"></div>
        </div>
    </div>

    <div class="section" id="section-expenses">
        <div class="card" id="rentCard">
            <div class="card-title"><div class="icon" style="background:var(--ink); color:white;">🏠</div>Loyer & Charges</div>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div id="rentDisplay" style="font-family:'DM Serif Display'; font-size:1.5rem;">0,00 €</div>
                <button id="btnRentPaid" class="btn" onclick="toggleRentPaid()">En attente</button>
            </div>
        </div>
        <div class="expense-list" id="expenseList"></div>
    </div>

    <div class="section" id="section-budgets">
        <div class="card">
            <div class="card-title">Suivi détaillé</div>
            <div id="budgetTracking"></div>
        </div>
    </div>

    <div class="section" id="section-settings">
        <div class="card">
            <div class="card-title">Loyer mensuel</div>
            <div class="form-row">
                <div class="form-group"><label>Total</label><input type="number" id="rentTotal" oninput="autoCalcRent()"></div>
                <div class="form-group"><label>Part Vincent</label><input type="number" id="rentVincent"></div>
            </div>
        </div>
        <div class="card">
            <div class="card-title">Budgets mensuels</div>
            <div id="budgetSettings"></div>
            <button class="btn btn-secondary" style="width:100%; margin-top:10px;" onclick="addBudgetRow()">+ Ajouter</button>
            <button class="btn btn-primary" style="width:100%; margin-top:10px;" onclick="saveBudgets()">Enregistrer</button>
        </div>
        <div class="card">
            <div class="card-title">Ratio Charges</div>
            <input type="range" id="ratioSlider" min="0" max="100" step="5" style="width:100%">
            <div style="display:flex; justify-content:space-between; font-size:0.8rem; margin-top:5px;">
                <span>Vincent: <b id="ratioV">50%</b></span>
                <span>Margaux: <b id="ratioM">50%</b></span>
            </div>
            <button class="btn btn-primary" style="width:100%; margin-top:15px;" onclick="saveRatio()">Enregistrer Ratio</button>
        </div>
    </div>
</main>

<button class="fab" onclick="openQuickAdd()">+</button>

<div class="modal-overlay" id="quickAddOverlay">
    <div class="modal">
        <div class="card-title">Ajouter une dépense</div>
        <div class="form-group"><label>Description</label><input type="text" id="expDesc"></div>
        <div class="form-row">
            <div class="form-group"><label>Montant (€)</label><input type="number" id="expAmt" step="0.01"></div>
            <div class="form-group"><label>Catégorie</label><select id="expCat"></select></div>
        </div>
        <div class="form-group"><label>Payé par</label>
            <select id="expPayer">
                <option value="commun">Compte commun</option>
                <option value="vincent">Vincent</option>
                <option value="margaux">Margaux</option>
            </select>
        </div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn btn-secondary" style="flex:1" onclick="closeQuickAdd()">Annuler</button>
            <button class="btn btn-primary" style="flex:1" onclick="submitExpense()">Ajouter</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

<script>
// =============================================
// CONFIGURATION & INITIALISATION
// =============================================
const firebaseConfig = {
    apiKey: "AIzaSyBERQisayOiZVcfppbBKjKnC7YN41yat84",
    authDomain: "babouches-finances.firebaseapp.com",
    projectId: "babouches-finances",
    storageBucket: "babouches-finances.firebasestorage.app",
    messagingSenderId: "662355866301",
    appId: "1:662355866301:web:cd84aede78a90d3288bdd4"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const provider = new firebase.auth.GoogleAuthProvider();

const ALLOWED_EMAILS = ['ribesse.vincent@gmail.com', 'margaux.huens@gmail.com'];
const CATEGORIES = {
    nourriture: { label: 'Nourriture', color: '#4a7c6e' },
    energie: { label: 'Énergie', color: '#d4a843' },
    internet: { label: 'Internet', color: '#3a7cb5' },
    transport: { label: 'Transport', color: '#c96c3a' },
    loisirs: { label: 'Loisirs', color: '#5c9ce0' },
    autre: { label: 'Autre', color: '#9a8e82' }
};

let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth() + 1;
let globalData = { finances: {}, cagnotte: 0 };
let isOffline = false;

// =============================================
// AUTHENTIFICATION
// =============================================
document.getElementById('loginBtn').onclick = () => {
    auth.signInWithRedirect(provider);
};

auth.onAuthStateChanged(user => {
    if (user) {
        if (ALLOWED_EMAILS.includes(user.email)) {
            document.getElementById('auth-screen').style.display = 'none';
            initApp();
        } else {
            document.getElementById('auth-error').style.display = 'block';
            auth.signOut();
        }
    } else {
        document.getElementById('auth-screen').style.display = 'flex';
    }
});

function logout() { auth.signOut(); }

// =============================================
// DATA SYNC (FIRESTORE)
// =============================================
function initApp() {
    // Écoute temps réel
    db.collection('couples').doc('vincent_margaux').onSnapshot(doc => {
        if (doc.exists) {
            globalData = doc.data();
            localStorage.setItem('babouches_backup', JSON.stringify(globalData));
            renderAll();
        } else {
            // Initialisation si premier usage
            saveGlobalData();
        }
    });
}

async function saveGlobalData() {
    try {
        await db.collection('couples').doc('vincent_margaux').set(globalData);
    } catch (e) {
        showToast("Erreur de synchro - Mode local");
    }
}

function getMonthKey() { return `${currentYear}-${String(currentMonth).padStart(2, '0')}`; }

function getCurrentMonthData() {
    const key = getMonthKey();
    if (!globalData.finances[key]) {
        globalData.finances[key] = {
            expenses: [],
            budgets: { nourriture: 0, energie: 0, internet: 0 },
            rent: { total: 1082, vincent: 541, paid: false },
            ratio: 50,
            settled: { vincent: false, margaux: false }
        };
    }
    return globalData.finances[key];
}

// =============================================
// RENDU UI
// =============================================
function renderAll() {
    updateMonthDisplay();
    const data = getCurrentMonthData();
    renderSummary(data);
    renderExpenses(data);
    renderSettings(data);
    populateCats();
}

function updateMonthDisplay() {
    const d = new Date(currentYear, currentMonth - 1);
    document.getElementById('monthDisplay').textContent = d.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' });
}

function changeMonth(dir) {
    currentMonth += dir;
    if (currentMonth > 12) { currentMonth = 1; currentYear++; }
    if (currentMonth < 1) { currentMonth = 12; currentYear--; }
    renderAll();
}

function renderSummary(data) {
    const stats = calcStats(data);
    const grid = document.getElementById('summaryCards');
    
    let html = `
        <div class="stat-card accent"><div class="label">Solde</div><div class="value">${fmt(stats.balance)}</div></div>
        <div class="stat-card"><div class="label">Dépenses</div><div class="value">${fmt(stats.totalExp)}</div></div>
        <div class="stat-card cagnotte"><div class="label">Cagnotte commune</div><div class="value">${fmt(globalData.cagnotte || 0)}</div></div>
        <div class="stat-card"><div class="label">Ratio</div><div class="value">${data.ratio}% / ${100-data.ratio}%</div></div>
    `;
    grid.innerHTML = html;

    // Bouton Cagnotte
    const cagArea = document.getElementById('cagnotteAction');
    if (stats.balance > 0.01) {
        cagArea.innerHTML = `<button class="btn btn-cagnotte" onclick="transferToCagnotte(${stats.balance})">💰 Mettre ${fmt(stats.balance)} en épargne</button>`;
    } else {
        cagArea.innerHTML = '';
    }

    // Remboursements
    let rHtml = '';
    if (!data.settled.vincent && stats.owedToV > 0.01) {
        rHtml += `<div class="reimb-item owed">Le compte doit à Vincent <span class="reimb-amount">${fmt(stats.owedToV)}</span><br><button class="btn btn-settle" onclick="markSettled('vincent')">Marquer comme fait</button></div>`;
    }
    if (!data.settled.margaux && stats.owedToM > 0.01) {
        rHtml += `<div class="reimb-item owed">Le compte doit à Margaux <span class="reimb-amount">${fmt(stats.owedToM)}</span><br><button class="btn btn-settle" onclick="markSettled('margaux')">Marquer comme fait</button></div>`;
    }
    if (rHtml === '') rHtml = `<div class="reimb-item balanced">✓ Tout est réglé</div>`;
    document.getElementById('reimbursements').innerHTML = rHtml;

    // Budgets Summary
    renderBudgetBars(data, 'summaryBudgets');
}

function renderExpenses(data) {
    const list = document.getElementById('expenseList');
    
    // Loyer Card
    const rentVal = parseFloat(data.rent.total) || 0;
    document.getElementById('rentDisplay').textContent = fmt(rentVal);
    const btn = document.getElementById('btnRentPaid');
    btn.className = data.rent.paid ? 'btn btn-primary' : 'btn btn-secondary';
    btn.textContent = data.rent.paid ? '✓ Payé' : 'En attente';

    if (data.expenses.length === 0) {
        list.innerHTML = '<div style="text-align:center; padding:40px; color:var(--ink-faint)">Aucune dépense</div>';
        return;
    }

    list.innerHTML = data.expenses.map(e => `
        <div class="expense-item">
            <div>
                <div class="expense-desc">${e.desc}</div>
                <div class="expense-meta">${CATEGORIES[e.cat]?.label || e.cat} • Par ${e.payer}</div>
            </div>
            <div class="expense-amount">${fmt(e.amt)}</div>
            <button style="border:none; background:none; color:var(--red); padding:5px" onclick="deleteExp(${e.id})">✕</button>
        </div>
    `).join('');
}

function renderSettings(data) {
    document.getElementById('rentTotal').value = data.rent.total;
    document.getElementById('rentVincent').value = data.rent.vincent;
    document.getElementById('ratioSlider').value = data.ratio;
    document.getElementById('ratioV').textContent = data.ratio + '%';
    document.getElementById('ratioM').textContent = (100 - data.ratio) + '%';

    const bS = document.getElementById('budgetSettings');
    bS.innerHTML = Object.entries(data.budgets).map(([cat, val]) => `
        <div class="form-row" style="margin-bottom:8px">
            <input type="text" value="${cat}" readonly>
            <input type="number" class="b-val" data-cat="${cat}" value="${val}">
        </div>
    `).join('');
}

// =============================================
// LOGIQUE METIER
// =============================================
function calcStats(data) {
    const ratioV = data.ratio / 100;
    const ratioM = (100 - data.ratio) / 100;
    const totalBgt = Object.values(data.budgets).reduce((a, b) => a + (parseFloat(b) || 0), 0);
    const rent = parseFloat(data.rent.total) || 0;
    
    const contribV = (parseFloat(data.rent.vincent) || 0) + (totalBgt * ratioV);
    const contribM = (rent - (parseFloat(data.rent.vincent) || 0)) + (totalBgt * ratioM);
    
    let paidByCommun = data.rent.paid ? rent : 0;
    let owedToV = 0;
    let owedToM = 0;

    data.expenses.forEach(e => {
        const a = parseFloat(e.amt) || 0;
        if (e.payer === 'commun') paidByCommun += a;
        else if (e.payer === 'vincent') owedToV += a;
        else if (e.payer === 'margaux') owedToM += a;
    });

    return {
        totalContrib: contribV + contribM,
        totalExp: paidByCommun + owedToV + owedToM,
        balance: (contribV + contribM) - (paidByCommun + owedToV + owedToM),
        owedToV, owedToM
    };
}

async function submitExpense() {
    const desc = document.getElementById('expDesc').value;
    const amt = parseFloat(document.getElementById('expAmt').value);
    const cat = document.getElementById('expCat').value;
    const payer = document.getElementById('expPayer').value;

    if (!desc || !amt) return;

    const data = getCurrentMonthData();
    data.expenses.unshift({ id: Date.now(), desc, amt, cat, payer });
    await saveGlobalData();
    closeQuickAdd();
    showToast("Dépense ajoutée");
}

async function deleteExp(id) {
    const data = getCurrentMonthData();
    data.expenses = data.expenses.filter(e => e.id !== id);
    await saveGlobalData();
}

async function toggleRentPaid() {
    const data = getCurrentMonthData();
    data.rent.paid = !data.rent.paid;
    await saveGlobalData();
}

async function markSettled(who) {
    const data = getCurrentMonthData();
    data.settled[who] = true;
    await saveGlobalData();
    showToast("Remboursement validé");
}

async function transferToCagnotte(amt) {
    if (!confirm(`Transférer ${fmt(amt)} dans la cagnotte ?`)) return;
    globalData.cagnotte = (globalData.cagnotte || 0) + amt;
    // On simule une dépense "Épargne" pour équilibrer le mois
    const data = getCurrentMonthData();
    data.expenses.push({ id: Date.now(), desc: "Virement Épargne", amt: amt, cat: "autre", payer: "commun" });
    await saveGlobalData();
    showToast("Économies enregistrées ! 🚀");
}

async function saveBudgets() {
    const data = getCurrentMonthData();
    document.querySelectorAll('.b-val').forEach(input => {
        data.budgets[input.dataset.cat] = parseFloat(input.value) || 0;
    });
    await saveGlobalData();
    showToast("Budgets enregistrés");
}

async function saveRatio() {
    const data = getCurrentMonthData();
    data.ratio = parseInt(document.getElementById('ratioSlider').value);
    await saveGlobalData();
}

function autoCalcRent() {
    const total = parseFloat(document.getElementById('rentTotal').value) || 0;
    document.getElementById('rentVincent').value = (total / 2).toFixed(2);
}

async function duplicatePrevMonth() {
    let pm = currentMonth - 1, py = currentYear;
    if (pm < 1) { pm = 12; py--; }
    const prevKey = `${py}-${String(pm).padStart(2, '0')}`;
    const prevData = globalData.finances[prevKey];
    
    if (prevData) {
        const current = getCurrentMonthData();
        current.rent = { ...prevData.rent, paid: false };
        current.budgets = { ...prevData.budgets };
        current.ratio = prevData.ratio;
        await saveGlobalData();
        showToast("Mois dupliqué !");
    }
}

// =============================================
// UTILS & UI NAVIGATION
// =============================================
function showTab(tab, el) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('section-' + tab).classList.add('active');
    el.classList.add('active');
}

function toggleMenu() { document.getElementById('headerDropdown').classList.toggle('open'); }
function openQuickAdd() { 
    document.getElementById('quickAddOverlay').classList.add('open');
    document.getElementById('expDesc').focus();
}
function closeQuickAdd() { document.getElementById('quickAddOverlay').classList.remove('open'); }

function fmt(n) { return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR' }).format(n || 0); }

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

function populateCats() {
    const sel = document.getElementById('expCat');
    if (sel.options.length > 0) return;
    Object.entries(CATEGORIES).forEach(([k, v]) => {
        const opt = document.createElement('option');
        opt.value = k; opt.textContent = v.label;
        sel.appendChild(opt);
    });
}

function renderBudgetBars(data, containerId) {
    const cont = document.getElementById(containerId);
    const spends = {};
    data.expenses.forEach(e => spends[e.cat] = (spends[e.cat] || 0) + e.amt);
    
    cont.innerHTML = Object.entries(data.budgets).map(([cat, limit]) => {
        if (limit <= 0 && !spends[cat]) return '';
        const spent = spends[cat] || 0;
        const pct = limit > 0 ? Math.min((spent / limit) * 100, 100) : 0;
        return `
            <div style="margin-bottom:12px">
                <div style="display:flex; justify-content:space-between; font-size:0.75rem; margin-bottom:4px">
                    <span>${CATEGORIES[cat]?.label}</span>
                    <span><b>${fmt(spent)}</b> / ${fmt(limit)}</span>
                </div>
                <div class="progress-bar"><div class="progress-fill" style="width:${pct}%; background:${pct > 95 ? 'var(--red)' : 'var(--sage)'}"></div></div>
            </div>
        `;
    }).join('');
}

function exportCSV() {
    const data = getCurrentMonthData();
    let csv = "Description,Montant,Categorie,Payeur\n";
    data.expenses.forEach(e => {
        csv += `"${e.desc}",${e.amt},${e.cat},${e.payer}\n`;
    });
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.setAttribute('href', url);
    a.setAttribute('download', `Babouches-${getMonthKey()}.csv`);
    a.click();
}

// Close menu on click outside
document.addEventListener('click', e => {
    if (!e.target.closest('.header-menu-wrap')) document.getElementById('headerDropdown').classList.remove('open');
});

// Listener pour le slider ratio
document.getElementById('ratioSlider').oninput = function() {
    document.getElementById('ratioV').textContent = this.value + '%';
    document.getElementById('ratioM').textContent = (100 - this.value) + '%';
};
</script>
